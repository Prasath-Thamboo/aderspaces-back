version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: maisonprint_postgres
    environment:
      POSTGRES_DB: maisonprint
      POSTGRES_USER: maisonprint
      POSTGRES_PASSWORD: maisonprint_pwd
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maisonprint -d maisonprint"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: maisonprint_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: maisonprint_meilisearch
    environment:
      MEILI_MASTER_KEY: masterKeyDevOnlyChangeInProd
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: maisonprint_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Initialise le bucket MinIO au démarrage
  minio-init:
    image: minio/mc:latest
    container_name: maisonprint_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb local/maisonprint --ignore-existing &&
        mc anonymous set download local/maisonprint &&
        echo 'MinIO bucket maisonprint ready.'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
